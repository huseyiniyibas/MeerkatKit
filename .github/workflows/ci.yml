name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - destination: "generic/platform=iOS Simulator"
            name: "iOS (deploy ≥17.5)"
            platform: ios
          - destination: "platform=macOS"
            name: "macOS (deploy ≥14.5)"
            platform: macos
          - destination: "generic/platform=tvOS Simulator"
            name: "tvOS (deploy ≥17.5)"
            platform: tvos
          - destination: "generic/platform=visionOS Simulator"
            name: "visionOS (deploy ≥1.5)"
            platform: visionos
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and Test
        run: |
          run_xcodebuild() {
            xcodebuild -scheme MeerkatKit "$@"
          }

          simulator_udid() {
            local runtime="$1"
            shift
            for pattern in "$@"; do
              local udid
              udid=$(xcrun simctl list devices available "$runtime" \
                | grep -E "$pattern" \
                | head -1 \
                | grep -Eo '[0-9A-F-]{36}' \
                | head -1)
              if [ -n "$udid" ]; then
                echo "$udid"
                return 0
              fi
            done
            return 1
          }

          if [ "${{ matrix.platform }}" = "ios" ]; then
            IOS_UDID=$(simulator_udid "iOS" 'iPhone')
            if [ -z "$IOS_UDID" ]; then
              echo "No available iOS Simulator device found on runner."
              xcrun simctl list devices available
              exit 1
            fi
            echo "Package minimum deployment: iOS 17.5 (Package.swift)"
            echo "Using iOS Simulator: $IOS_UDID"
            run_xcodebuild -destination "id=$IOS_UDID" test
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            run_xcodebuild -destination 'platform=macOS' test
          elif [ "${{ matrix.platform }}" = "tvos" ]; then
            TVOS_UDID=$(simulator_udid "tvOS" 'Apple TV' 'TV')
            if [ -z "$TVOS_UDID" ]; then
              echo "No available tvOS Simulator device found on runner."
              xcrun simctl list devices available
              exit 1
            fi
            echo "Using tvOS Simulator: $TVOS_UDID"
            run_xcodebuild -destination "id=$TVOS_UDID" test
          else
            VISIONOS_UDID=$(simulator_udid "visionOS" 'Apple Vision Pro' 'Vision Pro')
            if [ -z "$VISIONOS_UDID" ]; then
              echo "No available visionOS Simulator device found on runner."
              xcrun simctl list devices available
              exit 1
            fi
            echo "Using visionOS Simulator: $VISIONOS_UDID"
            run_xcodebuild -destination "id=$VISIONOS_UDID" test
          fi

  docbuild:
    runs-on: macos-15
    name: DocC
    steps:
      - uses: actions/checkout@v4
      - name: Build documentation
        run: xcodebuild docbuild -scheme MeerkatKit -destination 'platform=macOS' -derivedDataPath .derivedData
