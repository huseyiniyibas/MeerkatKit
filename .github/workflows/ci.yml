name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - destination: "platform=iOS Simulator,name=iPhone 16 Pro,OS=18.6"
            name: iOS 18
          - destination: "platform=macOS"
            name: macOS
          - destination: "generic/platform=tvOS Simulator"
            name: tvOS
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and Test
        run: |
          if [ "${{ matrix.name }}" = "iOS 18" ]; then
            xcodebuild -scheme MeerkatKit \
              -destination '${{ matrix.destination }}' \
              build test
          else
            xcodebuild -scheme MeerkatKit \
              -destination '${{ matrix.destination }}' \
              build
          fi
