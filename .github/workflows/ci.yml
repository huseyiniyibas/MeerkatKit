name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build and Test
        run: |
          xcodebuild -scheme MeerkatKit \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=18.6' \
            build test
