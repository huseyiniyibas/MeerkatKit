name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - destination: "generic/platform=iOS Simulator"
            name: iOS
            run_tests: true
          - destination: "platform=macOS"
            name: macOS
            run_tests: false
          - destination: "generic/platform=tvOS Simulator"
            name: tvOS
            run_tests: false
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and Test
        run: |
          if [ "${{ matrix.run_tests }}" = "true" ]; then
            xcodebuild -scheme MeerkatKit \
              -destination '${{ matrix.destination }}' \
              build test
          else
            xcodebuild -scheme MeerkatKit \
              -destination '${{ matrix.destination }}' \
              build
          fi
