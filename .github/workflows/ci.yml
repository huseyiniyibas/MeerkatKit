name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - destination: "generic/platform=iOS Simulator"
            name: "iOS (deploy ≥17.5)"
            platform: ios
          - destination: "platform=macOS"
            name: "macOS (deploy ≥14.5)"
            platform: macos
          - destination: "generic/platform=tvOS Simulator"
            name: "tvOS (deploy ≥17.5)"
            platform: tvos
          - destination: "generic/platform=visionOS Simulator"
            name: "visionOS (deploy ≥1.5)"
            platform: visionos
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and Test
        run: |
          if [ "${{ matrix.platform }}" = "ios" ]; then
            IOS_UDID=$(xcrun simctl list devices available iOS | awk -F '[()]' '/iPhone/ { print $2; exit }')
            if [ -z "$IOS_UDID" ]; then
              echo "No available iOS Simulator device found on runner."
              xcrun simctl list devices available
              exit 1
            fi
            echo "Package minimum deployment: iOS 17.5 (Package.swift)"
            xcrun simctl list devices available | grep "$IOS_UDID" || true
            xcodebuild -scheme MeerkatKit \
              -destination "id=$IOS_UDID" \
              test
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            xcodebuild -scheme MeerkatKit \
              -destination 'platform=macOS' \
              test
          else
            xcodebuild -scheme MeerkatKit \
              -destination '${{ matrix.destination }}' \
              test
          fi
