name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - destination: "generic/platform=iOS Simulator"
            name: "iOS (deploy ≥17.5)"
            run_tests: true
          - destination: "platform=macOS"
            name: "macOS (deploy ≥14.5)"
            run_tests: false
          - destination: "generic/platform=tvOS Simulator"
            name: "tvOS (deploy ≥17.5)"
            run_tests: false
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and Test
        run: |
          if [ "${{ matrix.run_tests }}" = "true" ]; then
            IOS_UDID=$(xcrun simctl list devices available iOS | awk -F '[()]' '/iPhone/ { print $2; exit }')
            if [ -z "$IOS_UDID" ]; then
              echo "No available iOS Simulator device found on runner."
              xcrun simctl list devices available
              exit 1
            fi
            echo "Package minimum deployment: iOS 17.5 (Package.swift)"
            xcrun simctl list devices available | grep "$IOS_UDID" || true
            xcodebuild -scheme MeerkatKit \
              -destination "id=$IOS_UDID" \
              test
          else
            xcodebuild -scheme MeerkatKit \
              -destination '${{ matrix.destination }}' \
              build
          fi
